<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porte de Carteret Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --open-light: #10b981;
            --open-dark: #065f46; /* Vert plus foncé pour le cercle ext et la barre */
            --closed-color: #ef4444;
            --text-main: #1e293b;
        }

        body { font-family: 'Montserrat', sans-serif; background: var(--primary-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 100%;
            text-align: center; position: relative;
        }

        /* Bouton Menu en haut à droite */
        .menu-btn {
            position: absolute; top: 20px; right: 20px;
            background: #e2e8f0; border: none; border-radius: 8px;
            padding: 8px; cursor: pointer; color: var(--text-main);
        }

        h2 { color: var(--text-main); font-size: 1.4rem; margin: 10px 0 5px 0; }
        .date-badge { display: inline-block; background: #f1f5f9; padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: #64748b; }

        /* Tirant d'eau */
        .draft-container { background: #f8fafc; padding: 12px; border-radius: 16px; margin: 20px 0; border: 1px solid #f1f5f9; }
        input[type="number"] { border: 2px solid #cbd5e1; border-radius: 8px; padding: 5px; width: 50px; text-align: center; font-weight: bold; }

        /* L'indicateur avec double cercle */
        .status-box {
            width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: all 0.5s ease;
            box-sizing: border-box;
        }

        /* Le cercle extérieur épais de 2mm (~8px) */
        .status-box.open { 
            background: var(--open-light); 
            border: 8px solid var(--open-dark); 
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
            animation: pulse 2s infinite;
        }
        .status-box.closed { background: var(--closed-color); border: 8px solid #991b1b; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .status-label { font-size: 0.7rem; opacity: 0.9; text-transform: uppercase; font-weight: bold; }
        .status-value { font-size: 1.7rem; font-weight: 700; }

        /* Barre de progression avec texte intégré */
        .progress-wrapper { margin: 20px 0; display: none; }
        .progress-container {
            width: 100%; background: #e2e8f0; height: 24px; border-radius: 12px;
            overflow: hidden; position: relative;
        }
        .progress-bar { 
            height: 100%; background: var(--open-dark); width: 0%; 
            transition: width 1s linear; display: flex; align-items: center; justify-content: center;
        }
        .progress-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 0.75rem; font-weight: bold; color: white; pointer-events: none;
        }

        .info-text { font-weight: bold; font-size: 1.1rem; color: var(--text-main); }

        /* Espace Publicitaire */
        .ad-space {
            margin-top: 25px; padding: 15px; border: 2px dashed #cbd5e1;
            border-radius: 16px; background: #fdfdfd; color: #64748b;
            font-size: 0.85rem; font-weight: 600;
        }

        .disclaimer { 
            font-size: 0.65rem; color: #94a3b8; margin-top: 25px; padding-top: 15px; 
            border-top: 1px solid #f1f5f9; line-height: 1.4; text-align: justify;
        }
    </style>
</head>
<body>

    <div class="card">
        <button class="menu-btn">☰</button>
        <div class="date-badge" id="current-date">-- --</div>
        <h2>Porte de Carteret</h2>
        
        <div class="draft-container">
            <span style="font-size: 0.85rem;">Mon tirant d'eau : </span>
            <input type="number" id="draft" value="0" min="0" step="0.1" onchange="updateApp()"> 
            <span style="font-weight: bold;">m</span>
        </div>

        <div id="status-box" class="status-box closed">
            <span class="status-label">Porte</span>
            <span class="status-value" id="status-text">--</span>
        </div>

        <div class="progress-wrapper" id="progress-wrapper">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <div class="progress-text" id="time-left">--</div>
            </div>
        </div>

        <div class="info-text" id="next-event">Calcul...</div>
        <div id="details" style="font-size: 0.85rem; color: #64748b; margin-top: 5px;"></div>

        <div class="ad-space">
            📢 PUBLICITÉ<br>
            <span style="font-size: 0.75rem; font-weight: 400;">Votre commerce local ici</span>
        </div>

        <div class="disclaimer">
            <strong>ATTENTION :</strong> Les horaires peuvent varier selon la météo (+/- 30 min). Le capitaine est responsable de sa navigation. L'éditeur décline toute responsabilité en cas d'erreur.
        </div>
    </div>

    <script>
        const data = [
            { date: "2026-04-21", open: "06:25", close: "11:51" },
            { date: "2026-04-21", open: "18:46", close: "23:59" },
            { date: "2026-04-22", open: "07:00", close: "12:27" }
        ];

        function updateApp() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
            
            const draft = parseFloat(document.getElementById('draft').value) || 0;
            const draftMs = draft * 60 * 60 * 1000; 

            let found = false;
            const wrapper = document.getElementById('progress-wrapper');

            for (let item of data) {
                const o = new Date(item.date + "T" + item.open);
                const c = new Date(item.date + "T" + item.close);
                const sO = new Date(o.getTime() + draftMs);
                const sC = new Date(c.getTime() - draftMs);

                if (now >= sO && now <= sC) {
                    updateUI("OUVERT", "open", "Fermeture prévue à " + item.close);
                    
                    // Calcul temps restant
                    wrapper.style.display = "block";
                    const diffMs = sC - now;
                    const hours = Math.floor(diffMs / (1000 * 60 * 60));
                    const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    
                    document.getElementById('time-left').innerText = hours + "h" + (minutes < 10 ? "0" : "") + minutes + " avant fermeture";
                    
                    const total = sC - sO;
                    const percent = ((now - sO) / total) * 100;
                    document.getElementById('progress-bar').style.width = percent + "%";
                    
                    document.getElementById('details').innerText = "Créneau officiel : " + item.open + " - " + item.close;
                    found = true; break;
                } else if (now < sO) {
                    updateUI("FERMÉ", "closed", "Ouverture à " + sO.toLocaleTimeString([], {hour: '2h-digit', minute:'2h-digit'}));
                    wrapper.style.display = "none";
                    document.getElementById('details').innerText = "Calculé pour " + draft + "m de tirant d'eau";
                    found = true; break;
                }
            }

            if (!found) {
                updateUI("INDISP.", "closed", "Plus de créneau ce jour");
                wrapper.style.display = "none";
            }
        }

        function updateUI(status, className, next) {
            const box = document.getElementById('status-box');
            document.getElementById('status-text').innerText = status;
            box.className = "status-box " + className;
            document.getElementById('next-event').innerText = next;
        }

        setInterval(updateApp, 1000);
        updateApp();
    </script>
</body>
</html>
