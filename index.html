<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porte de Carteret Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --open-color: #10b981;
            --closed-color: #ef4444;
            --text-main: #1e293b;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--primary-bg); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 400px; width: 100%;
            text-align: center;
        }

        h2 { color: var(--text-main); font-size: 1.5rem; margin-bottom: 5px; }
        
        .date-badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 20px;
        }

        /* Tirant d'eau stylisé */
        .draft-container {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        input[type="number"] {
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 5px;
            width: 60px;
            text-align: center;
            font-weight: bold;
            outline: none;
        }

        /* L'indicateur animé */
        .status-box {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .status-box.open { background: var(--open-color); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); animation: pulse 2s infinite; }
        .status-box.closed { background: var(--closed-color); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .status-label { font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .status-value { font-size: 1.8rem; font-weight: 700; }

        /* Barre de progression temporelle */
        .progress-container {
            width: 100%;
            background: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
            display: none; /* affiché seulement si ouvert */
        }
        .progress-bar { height: 100%; background: var(--open-color); width: 0%; transition: width 1s linear; }

        .info-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .sub-text { font-size: 0.9rem; color: #64748b; }

        .disclaimer { 
            font-size: 0.7rem; 
            color: #94a3b8; 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid #f1f5f9;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="date-badge" id="current-date">-- --</div>
        <h2>Port de Carteret</h2>
        
        <div class="draft-container">
            <span style="font-size: 0.9rem; font-weight: 600;">Mon tirant d'eau : </span>
            <input type="number" id="draft" value="0" min="0" step="0.1" onchange="updateApp()"> 
            <span style="font-weight: bold;">m</span>
        </div>

        <div id="status-box" class="status-box closed">
            <span class="status-label">Porte</span>
            <span class="status-value" id="status-text">--</span>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="info-text" id="next-event">Calcul en cours...</div>
        <div class="sub-text" id="details">Veuillez patienter</div>

        <div class="disclaimer">
            <strong>ATTENTION :</strong> Les horaires peuvent varier selon la météo (+/- 30 min). L'éditeur décline toute responsabilité. Le capitaine reste seul responsable de sa navigation.
        </div>
    </div>

    <script>
        const data = [
            { date: "2026-04-21", open: "06:25", close: "11:51" },
            { date: "2026-04-21", open: "18:46", close: "23:59" },
            { date: "2026-04-22", open: "07:00", close: "12:27" }
        ];

        function updateApp() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
            
            const draft = parseFloat(document.getElementById('draft').value) || 0;
            const draftMs = draft * 60 * 60 * 1000; 

            let found = false;
            const box = document.getElementById('status-box');
            const progressContainer = document.getElementById('progress-container');

            for (let item of data) {
                const o = new Date(item.date + "T" + item.open);
                const c = new Date(item.date + "T" + item.close);
                const sO = new Date(o.getTime() + draftMs);
                const sC = new Date(c.getTime() - draftMs);

                if (now >= sO && now <= sC) {
                    // OUVERT
                    updateUI("OUVERT", "open", "Fermeture à " + item.close, "Créneau officiel : " + item.open + " - " + item.close);
                    
                    // Calcul de la barre de progression
                    progressContainer.style.display = "block";
                    const total = sC - sO;
                    const elapsed = now - sO;
                    const percent = (elapsed / total) * 100;
                    document.getElementById('progress-bar').style.width = percent + "%";
                    
                    found = true; break;
                } else if (now < sO) {
                    // FERMÉ (En attente du prochain)
                    updateUI("FERMÉ", "closed", "Ouverture prévue à " + sO.toLocaleTimeString([], {hour: '2h-digit', minute:'2h-digit'}), "Tirant d'eau pris en compte ("+draft+"m)");
                    progressContainer.style.display = "none";
                    found = true; break;
                }
            }

            if (!found) {
                updateUI("INDISP.", "closed", "Plus de créneau aujourd'hui", "Revenez demain pour les nouveaux horaires");
                progressContainer.style.display = "none";
            }
        }

        function updateUI(status, className, next, details) {
            const box = document.getElementById('status-box');
            document.getElementById('status-text').innerText = status;
            box.className = "status-box " + className;
            document.getElementById('next-event').innerText = next;
            document.getElementById('details').innerText = details;
        }

        setInterval(updateApp, 1000);
        updateApp();
    </script>
</body>
</html>
